name: Sentrux

on:
  pull_request:
    paths:
      - app/**
      - server/**
      - .sentrux/**
      - .github/workflows/sentrux.yml
      - '*'
      - '.*'
  push:
    branches:
      - main
    paths:
      - app/**
      - server/**
      - .sentrux/**
      - .github/workflows/sentrux.yml
      - '*'
      - '.*'

permissions:
  contents: read

concurrency:
  group: sentrux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sentrux
        run: |
          curl -fsSL https://raw.githubusercontent.com/sentrux/sentrux/main/install.sh | sh

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run sentrux rules check
        run: sentrux check .

      - name: Run sentrux gate on PR
        if: github.event_name == 'pull_request'
        env:
          SENTRUX_BASELINE_REF: origin/${{ github.base_ref }}
        run: ./scripts/sentrux-gate-guard.sh

      - name: Run sentrux gate on push
        if: github.event_name == 'push'
        env:
          SENTRUX_BASELINE_REF: ${{ github.event.before }}
        run: ./scripts/sentrux-gate-guard.sh
