name: Server CI

on:
  pull_request:
    paths:
      - server/**
      - '*'
      - '.*'
      - .github/workflows/server-ci.yml
  push:
    branches:
      - main
    paths:
      - server/**
      - '*'
      - '.*'
      - .github/workflows/server-ci.yml

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: pnpm --filter server lint:check
          - name: Typecheck
            command: pnpm --filter server typecheck
          - name: Tests
            command: pnpm --filter server test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
